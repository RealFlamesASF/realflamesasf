<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LernSeite</title>
<style>
body { font-family: Arial; margin:0; background:linear-gradient(135deg,#667eea,#764ba2); color:#111; }
header { background:rgba(0,0,0,0.7); color:white; padding:15px; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; }
.card { padding:20px; border-radius:15px; background:white; transition:0.3s; cursor:pointer; }
.card:hover { transform:scale(1.05); }
.blue { background:#3b82f6; color:white; }
.locked { background:#f87171; color:white; }
.hidden { display:none; }
#adminPanel { background:#111827; color:white; padding:15px; border-radius:10px; }
input, select, textarea { width:100%; margin:5px 0; padding:8px; border-radius:8px; border:none; }
iframe { width:100%; height:200px; border-radius:10px; }
.fade { animation:fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1;} }
</style>
</head>
<body>

<header>
<h1>📚 LernSeite</h1>
<button onclick="showLogin()">Admin</button>
</header>

<div class="container" id="classes">
<h2>Klassen</h2>
<div class="grid">
<div class="card" onclick="openClass(5)">5. Klasse</div>
<div class="card" onclick="openClass(6)">6. Klasse</div>
<div class="card" onclick="openClass(7)">7. Klasse</div>
<div class="card">8. Klasse (kommt bald)</div>
</div>
</div>

<div class="container hidden fade" id="subjects"></div>
<div class="container hidden fade" id="topics"></div>
<div class="container hidden fade" id="content"></div>

<div id="loginBox" class="container hidden">
<h2>Admin Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">
<h2>⚙️ Admin Panel</h2>
<select id="adminSubject"></select>
<input id="topicName" placeholder="Thema erstellen">
<button onclick="addTopic()">Thema hinzufügen</button>
<textarea id="postText" placeholder="Nachricht..."></textarea>
<input id="video" placeholder="YouTube Embed Link">
<select id="adminTopic"></select>
<button onclick="addPost()">Post hinzufügen</button>
<button onclick="unlockSubject()">Fach freischalten</button>
</div>

<script>
let isAdmin = false;
let currentClass = 7;
let data = JSON.parse(localStorage.getItem('data')) || {
classes:{
7:{ subjects:{
Deutsch:{unlocked:true,topics:{}},
Mathe:{unlocked:false,topics:{}},
Englisch:{unlocked:false,topics:{}},
Biologie:{unlocked:false,topics:{}},
Physik:{unlocked:false,topics:{}},
Chemie:{unlocked:false,topics:{}}
}}
}}

function save(){ localStorage.setItem('data', JSON.stringify(data)); }

function openClass(c){
currentClass=c;
document.getElementById('classes').classList.add('hidden');
if(!data.classes[c]){ alert('Wird noch gemacht'); return; }
renderSubjects();
}

function renderSubjects(){
let div = document.getElementById('subjects');
div.innerHTML = '<h2>Fächer</h2><div class="grid"></div>';
let grid = div.querySelector('.grid');
let subs = data.classes[currentClass].subjects;
for(let s in subs){
let sub = subs[s];
let card = document.createElement('div');
card.className = 'card '+(sub.unlocked?'':'locked');
card.innerHTML = sub.unlocked ? s : '🔒 '+s;
card.onclick = ()=>{
if(!sub.unlocked && !isAdmin){ alert('Gesperrt'); return; }
openTopics(s);
}
grid.appendChild(card);
}
div.classList.remove('hidden');
}

function openTopics(subject){
let div = document.getElementById('topics');
div.innerHTML = `<h2>${subject}</h2><div class='grid'></div>`;
let grid = div.querySelector('.grid');
let topics = data.classes[currentClass].subjects[subject].topics;
for(let t in topics){
let card = document.createElement('div');
card.className='card';
card.innerText=t;
card.onclick=()=>openPosts(subject,t);
grid.appendChild(card);
}
div.classList.remove('hidden');
}

function openPosts(subject,topic){
let div=document.getElementById('content');
div.innerHTML=`<h2>${topic}</h2>`;
let posts=data.classes[currentClass].subjects[subject].topics[topic];
posts.forEach((p,i)=>{
let card=document.createElement('div');
card.className='card fade';
card.innerHTML=`<h3>${p.text}</h3>${p.video?`<iframe src="${p.video}"></iframe>`:''}`;
if(isAdmin){
let del=document.createElement('button');
del.innerText='Löschen';
del.onclick=()=>{posts.splice(i,1); save(); openPosts(subject,topic);} 
card.appendChild(del);
}
div.appendChild(card);
});
div.classList.remove('hidden');
}

function showLogin(){ document.getElementById('loginBox').classList.remove('hidden'); }

function login(){
if(username.value==='admin' && password.value==='3005'){
isAdmin=true;
alert('Admin aktiv');
document.getElementById('adminPanel').classList.remove('hidden');
loadAdmin();
}
}

function loadAdmin(){
let subSel=adminSubject;
subSel.innerHTML='';
let subs=data.classes[currentClass].subjects;
for(let s in subs){ subSel.innerHTML+=`<option>${s}</option>` }
updateTopics();
}

function updateTopics(){
let s=adminSubject.value;
let topicSel=adminTopic;
topicSel.innerHTML='';
let topics=data.classes[currentClass].subjects[s].topics;
for(let t in topics){ topicSel.innerHTML+=`<option>${t}</option>` }
}
adminSubject.onchange=updateTopics;

function addTopic(){
let s=adminSubject.value;
let t=topicName.value;
let subj=data.classes[currentClass].subjects[s];
if(!subj.topics[t]) subj.topics[t]=[];
save(); updateTopics(); alert('Thema erstellt');
}

function addPost(){
let s=adminSubject.value;
let t=adminTopic.value;
let subj=data.classes[currentClass].subjects[s];
if(!subj.topics[t]) return;
subj.topics[t].push({text:postText.value,video:video.value});
save(); alert('Post hinzugefügt');
}

function unlockSubject(){
let s=adminSubject.value;
data.classes[currentClass].subjects[s].unlocked=true;
save(); alert('Freigeschaltet');
}
</script>

</body>
</html>
