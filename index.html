<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LernSeite</title>
<style>
body { font-family: Arial; margin:0; background:#0f172a; color:white; }
header { padding:15px; text-align:center; background:#1e293b; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px; }
.card { background:#1e293b; padding:20px; border-radius:15px; cursor:pointer; transition:0.3s; }
.card:hover { transform:scale(1.05); }
.locked { background:#7f1d1d; }
.hidden { display:none; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; }
#adminPanel { background:#020617; padding:20px; }
input, select, textarea { width:100%; margin:5px 0; padding:10px; border-radius:10px; border:none; }
iframe { width:100%; height:200px; border-radius:10px; }
#backBtn { position:fixed; top:10px; left:10px; background:#ef4444; color:white; display:none; }
</style>
</head>
<body>

<header>
<h1>📚 LernSeite</h1>
<button onclick="showLogin()">Admin</button>
</header>

<button id="backBtn" onclick="goBack()">⬅️ Zurück</button>

<div class="container" id="classes"></div>
<div class="container hidden" id="subjects"></div>
<div class="container hidden" id="topics"></div>
<div class="container hidden" id="content"></div>

<div id="loginBox" class="container hidden">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">
<h2>⚙️ Admin</h2>
<select id="adminClass"></select>
<select id="adminSubject"></select>
<input id="topicName" placeholder="Thema">
<button onclick="addTopic()">Thema hinzufügen</button>
<button onclick="deleteTopic()">Thema löschen</button>

<select id="adminTopic"></select>
<textarea id="postText" placeholder="Post"></textarea>
<input id="video" placeholder="YouTube Link">
<button onclick="addPost()">Post hinzufügen</button>

<button onclick="toggleClass()">Klasse an/aus</button>
<button onclick="toggleSubject()">Fach an/aus</button>
</div>

<script>
let isAdmin=false;
let view='classes';
let currentClass=null;
let currentSubject=null;

let data=JSON.parse(localStorage.getItem('data'))||{classes:{}};

for(let i=5;i<=10;i++){
 if(!data.classes[i]){
  data.classes[i]={enabled:true,subjects:{
    Deutsch:{enabled:true,topics:{}},
    Mathe:{enabled:false,topics:{}},
    Englisch:{enabled:false,topics:{}},
    Biologie:{enabled:false,topics:{}},
    Physik:{enabled:false,topics:{}},
    Chemie:{enabled:false,topics:{}}
  }};
 }
}

function save(){localStorage.setItem('data',JSON.stringify(data));}

function showBack(){ document.getElementById('backBtn').style.display = view==='classes' ? 'none':'block'; }

function renderClasses(){
view='classes'; showBack();
let div=document.getElementById('classes');
div.innerHTML='<h2>Klassen</h2><div class="grid"></div>';
let grid=div.querySelector('.grid');
for(let c in data.classes){
 let cl=data.classes[c];
 let card=document.createElement('div');
 card.className='card '+(cl.enabled?'':'locked');
 card.innerText=cl.enabled?c+'. Klasse':'🔒 '+c+'. Klasse';
 card.onclick=()=>{
  if(!cl.enabled && !isAdmin)return alert('Gesperrt');
  currentClass=c;
  openSubjects();
 }
 grid.appendChild(card);
}
}

function openSubjects(){
view='subjects'; showBack();
document.getElementById('classes').classList.add('hidden');
let div=document.getElementById('subjects');
div.innerHTML='<h2>Fächer</h2><div class="grid"></div>';
let grid=div.querySelector('.grid');
let subs=data.classes[currentClass].subjects;
for(let s in subs){
 let sub=subs[s];
 let card=document.createElement('div');
 card.className='card '+(sub.enabled?'':'locked');
 card.innerText=sub.enabled?s:'🔒 '+s;
 card.onclick=()=>{
  if(!sub.enabled && !isAdmin)return alert('Gesperrt');
  currentSubject=s;
  openTopics();
 }
 grid.appendChild(card);
}
div.classList.remove('hidden');
}

function openTopics(){
view='topics'; showBack();
document.getElementById('subjects').classList.add('hidden');
let div=document.getElementById('topics');
div.innerHTML='<h2>Themen</h2><div class="grid"></div>';
let grid=div.querySelector('.grid');
let topics=data.classes[currentClass].subjects[currentSubject].topics;
for(let t in topics){
 let card=document.createElement('div');
 card.className='card';
 card.innerText=t;
 card.onclick=()=>openPosts(t);
 grid.appendChild(card);
}
div.classList.remove('hidden');
}

function openPosts(topic){
view='content'; showBack();
document.getElementById('topics').classList.add('hidden');
let div=document.getElementById('content');
div.innerHTML='<h2>'+topic+'</h2>';
let posts=data.classes[currentClass].subjects[currentSubject].topics[topic];
posts.forEach((p,i)=>{
 let card=document.createElement('div');
 card.className='card';
 card.innerHTML=`<h3>${p.text}</h3>${p.video?`<iframe src="${p.video}"></iframe>`:''}`;
 if(isAdmin){
  let del=document.createElement('button');
  del.innerText='Löschen';
  del.onclick=()=>{posts.splice(i,1); save(); openPosts(topic);} 
  card.appendChild(del);
 }
 div.appendChild(card);
});
div.classList.remove('hidden');
}

function goBack(){
if(view==='subjects'){ document.getElementById('subjects').classList.add('hidden'); renderClasses(); }
else if(view==='topics'){ document.getElementById('topics').classList.add('hidden'); openSubjects(); }
else if(view==='content'){ document.getElementById('content').classList.add('hidden'); openTopics(); }
}

function showLogin(){document.getElementById('loginBox').classList.remove('hidden');}

function login(){
 if(username.value==='admin'&&password.value==='3005'){
  isAdmin=true;
  document.getElementById('adminPanel').classList.remove('hidden');
  loadAdmin();
 }
}

function loadAdmin(){
adminClass.innerHTML='';
for(let c in data.classes){adminClass.innerHTML+=`<option>${c}</option>`}
updateSubjects();
}

function updateSubjects(){
let c=adminClass.value;
adminSubject.innerHTML='';
for(let s in data.classes[c].subjects){adminSubject.innerHTML+=`<option>${s}</option>`}
updateTopics();
}
adminClass.onchange=updateSubjects;

function updateTopics(){
let c=adminClass.value;
let s=adminSubject.value;
adminTopic.innerHTML='';
let topics=data.classes[c].subjects[s].topics;
for(let t in topics){adminTopic.innerHTML+=`<option>${t}</option>`}
}
adminSubject.onchange=updateTopics;

function addTopic(){
let c=adminClass.value;
let s=adminSubject.value;
let t=topicName.value;
if(!data.classes[c].subjects[s].topics[t])data.classes[c].subjects[s].topics[t]=[];
save(); updateTopics();
}

function deleteTopic(){
let c=adminClass.value;
let s=adminSubject.value;
let t=adminTopic.value;
delete data.classes[c].subjects[s].topics[t];
save(); updateTopics();
}

function addPost(){
let c=adminClass.value;
let s=adminSubject.value;
let t=adminTopic.value;
data.classes[c].subjects[s].topics[t].push({text:postText.value,video:video.value});
save();
}

function toggleClass(){
let c=adminClass.value;
data.classes[c].enabled=!data.classes[c].enabled;
save(); renderClasses();
}

function toggleSubject(){
let c=adminClass.value;
let s=adminSubject.value;
data.classes[c].subjects[s].enabled=!data.classes[c].subjects[s].enabled;
save(); renderClasses();
}

renderClasses();
</script>

</body>
</html>
