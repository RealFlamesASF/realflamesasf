<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>LernSeite</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#333; color:white; padding:10px; text-align:center; }
    .container { padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:10px; cursor:pointer; }
    .blue { background:#3498db; color:white; }
    .hidden { display:none; }
    button { padding:10px; margin:5px; cursor:pointer; }
    #adminPanel { background:#222; color:white; padding:10px; margin-top:20px; }
    input, textarea { width:100%; margin:5px 0; }
  </style>
</head>
<body>

<header>
  <h1>LernSeite</h1>
  <button onclick="showLogin()">Admin Login</button>
</header>

<div class="container" id="classes">
  <h2>Klassen auswählen</h2>
  <div class="card" onclick="openClass(7)">7. Klasse</div>
  <div class="card">Andere Klassen – Wird noch gemacht</div>
</div>

<div class="container hidden" id="subjects">
  <h2>Fächer (7. Klasse)</h2>
  <div class="card blue" onclick="openSubject('Deutsch')">Deutsch</div>
  <div class="card" onclick="locked()">Mathe – Wird noch gemacht</div>
  <div class="card" onclick="locked()">Englisch – Wird noch gemacht</div>
  <div class="card" onclick="locked()">Biologie – Wird noch gemacht</div>
  <button onclick="back()">Zurück</button>
</div>

<div class="container hidden" id="content">
  <h2 id="subjectTitle"></h2>
  <div id="posts"></div>
  <button onclick="backSubjects()">Zurück</button>
</div>

<div id="loginBox" class="container hidden">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">
  <h2>Admin Panel</h2>
  <textarea id="newPost" placeholder="Neuer Inhalt..."></textarea>
  <input id="video" placeholder="YouTube Embed Link">
  <button onclick="addPost()">Hinzufügen</button>
  <button onclick="deleteAll()">Alles löschen</button>
</div>

<script>
let isAdmin = false;
let posts = JSON.parse(localStorage.getItem('posts')) || [];

function save(){
  localStorage.setItem('posts', JSON.stringify(posts));
}

function openClass(cls) {
  document.getElementById('classes').classList.add('hidden');
  document.getElementById('subjects').classList.remove('hidden');
}

function locked(){
  alert('Wird noch gemacht');
}

function openSubject(name) {
  document.getElementById('subjects').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');
  document.getElementById('subjectTitle').innerText = name;
  renderPosts();
}

function back(){
  document.getElementById('subjects').classList.add('hidden');
  document.getElementById('classes').classList.remove('hidden');
}

function backSubjects(){
  document.getElementById('content').classList.add('hidden');
  document.getElementById('subjects').classList.remove('hidden');
}

function showLogin(){
  document.getElementById('loginBox').classList.remove('hidden');
}

function login(){
  let u = document.getElementById('username').value;
  let p = document.getElementById('password').value;
  if(u === 'admin' && p === '3005'){
    isAdmin = true;
    alert('Erfolgreich eingeloggt');
    document.getElementById('adminPanel').classList.remove('hidden');
  } else {
    alert('Falsche Daten');
  }
}

function addPost(){
  let text = document.getElementById('newPost').value;
  let video = document.getElementById('video').value;
  posts.push({text, video});
  save();
  renderPosts();
}

function renderPosts(){
  let container = document.getElementById('posts');
  container.innerHTML = '';
  posts.forEach((p, i) => {
    let div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h3>${p.text}</h3>${p.video ? `<iframe width="300" height="200" src="${p.video}" frameborder="0" allowfullscreen></iframe>` : ''}`;
    if(isAdmin){
      let del = document.createElement('button');
      del.innerText = 'Löschen';
      del.onclick = () => { posts.splice(i,1); save(); renderPosts(); };
      div.appendChild(del);
    }
    container.appendChild(div);
  });
}

function deleteAll(){
  posts = [];
  save();
  renderPosts();
}
</script>

</body>
</html>
