<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LernSeite</title>
<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
header { background:#1f2937; color:white; padding:15px; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:8px; }
.container { padding:15px; }
.card { padding:15px; border-radius:12px; margin:10px 0; background:white; }
.blue { background:#3b82f6; color:white; }
.locked { background:#fca5a5; }
.hidden { display:none; }
#adminPanel { background:#111827; color:white; padding:15px; border-radius:10px; }
input, select, textarea { width:100%; margin:5px 0; padding:8px; border-radius:6px; border:none; }
iframe { width:100%; height:200px; border-radius:10px; }
</style>
</head>
<body>

<header>
<h1>LernSeite</h1>
<button onclick="showLogin()">Admin</button>
</header>

<div class="container" id="classes">
<h2>Klassen</h2>
<div class="card" onclick="openClass()">7. Klasse</div>
</div>

<div class="container hidden" id="subjects"></div>
<div class="container hidden" id="topics"></div>
<div class="container hidden" id="content"></div>

<div id="loginBox" class="container hidden">
<h2>Admin Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">
<h2>Admin Panel</h2>
<select id="adminSubject"></select>
<input id="topicName" placeholder="Thema erstellen">
<button onclick="addTopic()">Thema hinzufügen</button>
<textarea id="postText" placeholder="Nachricht..."></textarea>
<input id="video" placeholder="YouTube Embed Link">
<select id="adminTopic"></select>
<button onclick="addPost()">Post hinzufügen</button>
<button onclick="unlockSubject()">Fach freischalten</button>
</div>

<script>
let isAdmin = false;
let data = JSON.parse(localStorage.getItem('data')) || {
subjects: {
Deutsch: { unlocked:true, topics:{} },
Mathe: { unlocked:false, topics:{} },
Englisch: { unlocked:false, topics:{} },
Biologie: { unlocked:false, topics:{} },
Physik: { unlocked:false, topics:{} },
Chemie: { unlocked:false, topics:{} }
}}

function save(){ localStorage.setItem('data', JSON.stringify(data)); }

function openClass(){
document.getElementById('classes').classList.add('hidden');
renderSubjects();
}

function renderSubjects(){
let div = document.getElementById('subjects');
div.innerHTML = '<h2>Fächer</h2>';
for(let s in data.subjects){
let sub = data.subjects[s];
let card = document.createElement('div');
card.className = 'card ' + (sub.unlocked ? '' : 'locked');
card.innerHTML = sub.unlocked ? s : '🔒 ' + s;
card.onclick = ()=>{
if(!sub.unlocked && !isAdmin){ alert('Gesperrt'); return; }
openTopics(s);
}
div.appendChild(card);
}
div.classList.remove('hidden');
}

function openTopics(subject){
let div = document.getElementById('topics');
div.innerHTML = `<h2>${subject}</h2>`;
let topics = data.subjects[subject].topics;
for(let t in topics){
let card = document.createElement('div');
card.className = 'card';
card.innerText = t;
card.onclick = ()=>openPosts(subject,t);
div.appendChild(card);
}
div.classList.remove('hidden');
}

function openPosts(subject, topic){
let div = document.getElementById('content');
div.innerHTML = `<h2>${topic}</h2>`;
let posts = data.subjects[subject].topics[topic];
posts.forEach((p,i)=>{
let card = document.createElement('div');
card.className = 'card';
card.innerHTML = `<h3>${p.text}</h3>${p.video?`<iframe src="${p.video}"></iframe>`:''}`;
if(isAdmin){
let del = document.createElement('button');
del.innerText='Löschen';
del.onclick=()=>{posts.splice(i,1); save(); openPosts(subject,topic);}
card.appendChild(del);
}
div.appendChild(card);
});
div.classList.remove('hidden');
}

function showLogin(){ document.getElementById('loginBox').classList.remove('hidden'); }

function login(){
if(username.value==='admin' && password.value==='3005'){
isAdmin=true;
alert('Admin aktiv');
document.getElementById('adminPanel').classList.remove('hidden');
loadAdmin();
}
}

function loadAdmin(){
let subSel = document.getElementById('adminSubject');
subSel.innerHTML='';
for(let s in data.subjects){
subSel.innerHTML += `<option>${s}</option>`;
}
updateTopics();
}

function updateTopics(){
let s = adminSubject.value;
let topicSel = document.getElementById('adminTopic');
topicSel.innerHTML='';
for(let t in data.subjects[s].topics){
topicSel.innerHTML += `<option>${t}</option>`;
}
}

adminSubject.onchange = updateTopics;

function addTopic(){
let s = adminSubject.value;
let t = topicName.value;
if(!data.subjects[s].topics[t]) data.subjects[s].topics[t]=[];
save();
updateTopics();
alert('Thema erstellt');
}

function addPost(){
let s = adminSubject.value;
let t = adminTopic.value;
if(!data.subjects[s].topics[t]) return;
data.subjects[s].topics[t].push({text:postText.value, video:video.value});
save();
alert('Post hinzugefügt');
}

function unlockSubject(){
let s = adminSubject.value;
data.subjects[s].unlocked = true;
save();
alert('Freigeschaltet');
}
</script>

</body>
</html>
